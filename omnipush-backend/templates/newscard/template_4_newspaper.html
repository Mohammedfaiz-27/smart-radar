<!DOCTYPE html>
<html lang="{{lang}}">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @font-face {
      font-family: "TAMIL-UNI013";
      src: url("https://newsit-assets.s3.ap-south-1.amazonaws.com/template/TAMIL-UNI013.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: "Grotesk";
      src: url("https://techoffee-public-1.s3.us-east-1.amazonaws.com/newsit/Grotesk-Medium.ttf") format("truetype");
      font-weight: bold;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: #2c1810;
      background-image:
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 2px,
          rgba(255,255,255,0.03) 2px,
          rgba(255,255,255,0.03) 4px
        );
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      padding: 0;
      margin: 0;
      overflow: hidden;
    }

    body.lang-ta {
      font-family: "TAMIL-UNI013", sans-serif;
    }

    body.lang-en {
      font-family: "Grotesk", serif;
      font-weight: bold;
    }

    .container {
      position: relative;
      text-align: center;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .inner-container {
      position: relative;
      text-align: center;
      color: #1f2937;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: start;
      flex-direction: column;
      background-image:
        radial-gradient(circle at 2px 2px, rgba(139, 69, 19, 0.15) 1px, transparent 0);
      background-size: 20px 20px;
    }

    .heading-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 25px 40px;
      background: #8B4513;
      border-bottom: 4px solid #654321;
    }

    .footer-row {
      width: 100%;
      height: 80px;
      display: flex;
      align-items: end;
      justify-content: stretch;
      margin-top: auto;
      padding: 0 clamp(20px, 4vw, 40px) 20px;
      background: #8B4513;
      border-top: 4px solid #654321;
    }

    .inner-footer-row {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0 clamp(20px, 4vw, 40px);
    }

    .inner-footer-row>div {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .pill {
      padding: 6px 16px;
      background: rgba(31, 41, 55, 0.1);
      border: 2px solid rgba(31, 41, 55, 0.8);
      color: rgba(31, 41, 55, 0.9);
      font-size: clamp(14px, 2vw, 18px);
      font-family: 'Times New Roman', serif;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .news {
      color: #f5f3f0;
      font-size: clamp(20px, 3vw, 28px);
      font-weight: bold;
      background: #654321;
      padding: 12px 24px;
      border: 3px solid #f5f3f0;
      text-transform: uppercase;
      font-family: 'Times New Roman', serif;
      letter-spacing: 2px;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.3);
    }

    .centered {
      color: #f5f3f0;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: clamp(20px, 4vw, 40px) clamp(25px, 5vw, 50px);
      flex-grow: 1;
      flex-direction: column;
      position: relative;
    }

    .headline-wrap {
      overflow: hidden;
      min-height: 0;
    }

    .centered::before {
      content: "";
      position: absolute;
      top: 30px;
      left: 30px;
      right: 30px;
      height: 4px;
      background: repeating-linear-gradient(
        90deg,
        #8B4513 0px,
        #8B4513 10px,
        transparent 10px,
        transparent 20px
      );
    }

    .centered span {
      max-width: 100%;
      max-height: 100%;
      font-size: clamp(24px, 8vw, 85px);
      line-height: 1.1;
      word-wrap: break-word;
      margin-bottom: 12px;
      font-weight: 900;
      color: #f5f3f0;
      text-shadow: 2px 2px 4px rgba(44, 24, 16, 0.8);
      font-family: 'Times New Roman', serif;
      margin-top: 20px;
    }

    .vintage-border {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 20px;
      border: 2px solid #8B4513;
      pointer-events: none;
    }
  </style>
  <title>{{channel_name}} - Daily Herald</title>
</head>

<body class="lang-ta">
  <div class="container">
    <div class="inner-container">
      <div class="vintage-border"></div>
      <div class="heading-row">
        <div class="news">{{category}}</div>
      </div>
      <div class="centered">
        <div class="headline-wrap">
          <span>{{content}}</span>
        </div>
      </div>
      <div class="footer-row">
        <div class="inner-footer-row">
          <div>
            <div class="pill">{{source}}</div>
            <div class="pill date">
              <div>{{date}}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/kishorek/dynamic-font-size-js@refs/heads/main/fontfit.js"></script>
  <script>
    const container = document.querySelector(".headline-wrap");
    const headline = document.querySelector(".centered span");
    const controller = window.fitFontToContainer(headline, container, {
      minPx: 8,
      maxPx: 80,
    });
    requestAnimationFrame(() => controller.refit());
  </script>
</body>

</html>
