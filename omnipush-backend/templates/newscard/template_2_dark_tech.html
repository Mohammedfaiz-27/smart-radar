<!DOCTYPE html>
<html lang="{{lang}}">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @font-face {
      font-family: "TAMIL-UNI013";
      src: url("https://newsit-assets.s3.ap-south-1.amazonaws.com/template/TAMIL-UNI013.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: "Grotesk";
      src: url("https://techoffee-public-1.s3.us-east-1.amazonaws.com/newsit/Grotesk-Medium.ttf") format("truetype");
      font-weight: bold;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      padding: 0;
      margin: 0;
      overflow: hidden;
    }

    body.lang-ta {
      font-family: "TAMIL-UNI013", sans-serif;
    }

    body.lang-en {
      font-family: "Grotesk", sans-serif;
      font-weight: bold;
    }

    .container {
      position: relative;
      text-align: center;
      color: white;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background:
        radial-gradient(circle at 20% 80%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 0, 255, 0.1) 0%, transparent 50%);
    }

    .inner-container {
      position: relative;
      text-align: center;
      color: #00ffff;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: start;
      flex-direction: column;
    }

    .heading-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 40px;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      border-bottom: 2px solid #00ffff;
    }

    .footer-row {
      width: 100%;
      height: 80px;
      display: flex;
      align-items: end;
      justify-content: stretch;
      margin-top: auto;
      padding: 0 clamp(20px, 4vw, 40px) 20px;
      background: rgba(0, 0, 0, 0.5);
    }

    .inner-footer-row {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0 clamp(20px, 4vw, 40px);
    }

    .inner-footer-row>div {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .pill {
      padding: 6px 16px;
      border: 2px solid rgba(0, 255, 255, 0.8);
      border-radius: 4px;
      color: rgba(0, 255, 255, 0.9);
      font-size: clamp(14px, 2vw, 18px);
      font-family: 'Courier New', monospace;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 255, 255, 0.1);
      text-transform: uppercase;
    }

    .news {
      color: #00ffff;
      font-size: clamp(20px, 3vw, 28px);
      font-weight: bold;
      background: rgba(0, 0, 0, 0.7);
      padding: 8px 16px;
      border: 1px solid #00ffff;
      border-radius: 4px;
      text-transform: uppercase;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
    }

    .centered {
      color: #ffffff;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: clamp(20px, 4vw, 40px) clamp(25px, 5vw, 50px);
      flex-grow: 1;
      flex-direction: column;
      background:
        linear-gradient(45deg, transparent 49%, rgba(0, 255, 255, 0.1) 50%, transparent 51%),
        linear-gradient(-45deg, transparent 49%, rgba(255, 0, 255, 0.1) 50%, transparent 51%);
      background-size: 20px 20px;
    }

    .headline-wrap {
      overflow: hidden;
      min-height: 0;
    }

    .centered span {
      /* max-width: 100%;
      max-height: 100%; */
      font-size: clamp(24px, 8vw, 85px);
      line-height: 1.15;
      word-wrap: break-word;
      margin-bottom: 12px;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
      font-weight: bold;
    }
  </style>
  <title>{{channel_name}} - Cyber News</title>
</head>

<body class="lang-ta">
  <div class="container">
    <div class="inner-container">
      <div class="heading-row">
        <div class="news">{{category}}</div>
      </div>
      <div class="centered">
        <div class="headline-wrap">
          <span>{{content}}</span>
        </div>
      </div>
      <div class="footer-row">
        <div class="inner-footer-row">
          <div>
            <div class="pill">{{source}}</div>
            <div class="pill date">
              <div>{{date}}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/kishorek/dynamic-font-size-js@refs/heads/main/fontfit.js"></script>
  <script>
    const container = document.querySelector(".headline-wrap");
    const headline = document.querySelector(".centered span");
    const controller = window.fitFontToContainer(headline, container, {
      minPx: 8,
      maxPx: 80,
    });
    requestAnimationFrame(() => controller.refit());
  </script>
</body>

</html>
