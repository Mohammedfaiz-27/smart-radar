<!DOCTYPE html>
<html lang="{{lang}}">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @font-face {
      font-family: "TAMIL-UNI013";
      src: url("https://newsit-assets.s3.ap-south-1.amazonaws.com/template/TAMIL-UNI013.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: "Grotesk";
      src: url("https://techoffee-public-1.s3.us-east-1.amazonaws.com/newsit/Grotesk-Medium.ttf") format("truetype");
      font-weight: bold;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      padding: 0;
      margin: 0;
      overflow: hidden;
    }

    body.lang-ta {
      font-family: "TAMIL-UNI013", sans-serif;
    }

    body.lang-en {
      font-family: "Grotesk", sans-serif;
      font-weight: bold;
    }

    .container {
      position: relative;
      text-align: center;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .inner-container {
      position: relative;
      text-align: center;
      color: #1f2937;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: start;
      flex-direction: column;
    }

    .heading-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 40px;
      border-bottom: 2px solid #f1f5f9;
    }

    .footer-row {
      width: 100%;
      height: 80px;
      display: flex;
      align-items: end;
      justify-content: stretch;
      margin-top: auto;
      padding: 0 clamp(20px, 4vw, 40px) 20px;
      border-top: 1px solid #f1f5f9;
      background: #fafbfc;
    }

    .inner-footer-row {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0 clamp(20px, 4vw, 40px);
    }

    .inner-footer-row>div {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .pill {
      padding: 8px 18px;
      background: rgba(31, 41, 55, 0.1);
      border: 2px solid rgba(31, 41, 55, 0.8);
      border-radius: 8px;
      color: rgba(31, 41, 55, 0.9);
      font-size: clamp(14px, 2vw, 18px);
      font-family: sans-serif;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .news {
      color: #ffffff;
      font-size: clamp(20px, 3vw, 28px);
      font-weight: bold;
      background: #1e293b;
      padding: 12px 24px;
      border-radius: 8px;
      text-transform: uppercase;
      font-family: sans-serif;
      letter-spacing: 1px;
    }

    .centered {
      color: #1e293b;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: clamp(20px, 4vw, 40px) clamp(25px, 5vw, 50px);
      flex-grow: 1;
      flex-direction: column;
    }

    .headline-wrap {
      overflow: hidden;
      min-height: 0;
    }

    .centered span {
      /* max-width: 100%;
      max-height: 100%; */
      font-size: clamp(24px, 8vw, 85px);
      line-height: 1.25;
      word-wrap: break-word;
      margin-bottom: 12px;
      font-weight: 600;
      color: #0f172a;
    }

    .accent-line {
      width: 60px;
      height: 4px;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      margin: 0 auto 30px auto;
      border-radius: 2px;
    }
  </style>
  <title>{{channel_name}} - News</title>
</head>

<body class="lang-ta">
  <div class="container">
    <div class="inner-container">
      <div class="heading-row">
        <div class="news">{{category}}</div>
      </div>
      <div class="accent-line"></div>
      <div class="centered">
        <div class="headline-wrap">
          <span>{{content}}</span>
        </div>
      </div>
      <div class="footer-row">
        <div class="inner-footer-row">
          <div>
            <div class="pill">{{source}}</div>
            <div class="pill date">
              <div>{{date}}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/kishorek/dynamic-font-size-js@refs/heads/main/fontfit.js"></script>
  <script>
    const container = document.querySelector(".headline-wrap");
    const headline = document.querySelector(".centered span");
    const controller = window.fitFontToContainer(headline, container, {
      minPx: 8,
      maxPx: 80,
    });
    requestAnimationFrame(() => controller.refit());
  </script>
</body>

</html>
