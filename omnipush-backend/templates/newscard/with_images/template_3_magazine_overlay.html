<!DOCTYPE html>
<html lang="{{lang}}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @font-face {
      font-family: "TAMIL-UNI013";
      src: url("https://newsit-assets.s3.ap-south-1.amazonaws.com/template/TAMIL-UNI013.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: "Grotesk";
      src: url("https://techoffee-public-1.s3.us-east-1.amazonaws.com/newsit/Grotesk-Medium.ttf") format("truetype");
      font-weight: bold;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at center, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
    }

    body.lang-ta {
      font-family: "TAMIL-UNI013", sans-serif;
    }

    body.lang-en {
      font-family: "Grotesk", sans-serif;
      font-weight: bold;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .background-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    .dark-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.5) 40%, rgba(0,0,0,0.8) 100%);
      z-index: 2;
    }

    .content {
      position: relative;
      z-index: 3;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: clamp(40px, 6vw, 60px);
      color: white;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .category-badge {
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      color: white;
      font-weight: bold;
      font-size: clamp(14px, 2vw, 18px);
      padding: 12px 24px;
      border-radius: 30px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-family: sans-serif;
      box-shadow: 0 8px 20px rgba(255, 107, 107, 0.3);
    }

    .logo-area {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 15px;
      padding: 15px 25px;
      font-family: sans-serif;
      font-weight: bold;
      font-size: clamp(18px, 3vw, 24px);
      color: white;
    }

    .main-content {
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(30px, 4vw, 40px) 0;
    }

    .headline-wrap {
      overflow: hidden;
      min-height: 0;
    }

    .headline {
      font-size: clamp(24px, 8vw, 85px);
      line-height: 1.2;
      font-weight: bold;
      text-align: center;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
      color: #ffffff;
      max-width: 100%;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: clamp(20px, 3vw, 35px) clamp(25px, 4vw, 35px);
      margin-top: 20px;
      font-family: sans-serif;
    }

    .source {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      color: white;
      padding: 12px 20px;
      border-radius: 25px;
      font-weight: bold;
      font-size: clamp(18px, 3vw, 24px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .date {
      color: rgba(255, 255, 255, 0.8);
      font-size: clamp(18px, 3vw, 24px);
      font-weight: normal;
    }

    .accent-lines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
      z-index: 4;
    }
  </style>
  <title>{{channel_name}} - News</title>
</head>

<body class="lang-ta">
  <div class="container">
    <div class="accent-lines"></div>
    <img src="{{image_url}}" alt="News Background" class="background-image" />
    <div class="dark-overlay"></div>
    <div class="content">
      <div class="header">
        <div class="category-badge">{{category}}</div>
        <div class="logo-area">{{source}}</div>
      </div>
      <div class="main-content">
        <div class="headline-wrap">
          <div class="headline">{{content}}</div>
        </div>
      </div>
      <div class="footer">
        <div style="color: rgba(255, 255, 255, 0.6);">Breaking News</div>
        <div class="date">{{date}}</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/kishorek/dynamic-font-size-js@refs/heads/main/fontfit.js"></script>
  <script>
    const container = document.querySelector(".headline-wrap");
    const headline = document.querySelector(".headline");
    const controller = window.fitFontToContainer(headline, container, {
      minPx: 8,
      maxPx: 80,
    });
    requestAnimationFrame(() => controller.refit());
  </script>
</body>
</html>
