<!DOCTYPE html>
<html lang="{{lang}}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @font-face {
      font-family: "TAMIL-UNI013";
      src: url("https://newsit-assets.s3.ap-south-1.amazonaws.com/template/TAMIL-UNI013.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: "Grotesk";
      src: url("https://techoffee-public-1.s3.us-east-1.amazonaws.com/newsit/Grotesk-Medium.ttf") format("truetype");
      font-weight: bold;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(45deg, #667eea 0%, #764ba2 50%, #ff9a9e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
    }

    body.lang-ta {
      font-family: "TAMIL-UNI013", sans-serif;
    }

    body.lang-en {
      font-family: "Grotesk", sans-serif;
      font-weight: bold;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #ffffff;
      overflow: hidden;
      display: flex;
    }

    .image-section {
      width: 45%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    .news-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(45deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.2));
    }

    .content-section {
      width: 55%;
      padding: clamp(30px, 5vw, 50px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }

    .header {
      margin-bottom: 30px;
    }

    .category-badge {
      display: inline-block;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      font-weight: bold;
      font-size: clamp(14px, 2vw, 18px);
      padding: 10px 20px;
      border-radius: 25px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: sans-serif;
      margin-bottom: clamp(15px, 2vw, 20px);
    }

    .headline-wrap {
      overflow: hidden;
      min-height: 0;
    }

    .headline {
      color: #1f2937;
      font-size: clamp(24px, 8vw, 85px);
      line-height: 1.3;
      font-weight: bold;
      flex-grow: 1;
      display: flex;
      align-items: center;
      margin-bottom: clamp(20px, 3vw, 30px);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: clamp(20px, 3vw, 25px);
      border-top: 3px solid #667eea;
      font-size: clamp(18px, 3vw, 24px);
      font-family: sans-serif;
      font-weight: bold;
    }

    .source {
      background: #f8fafc;
      color: #334155;
      padding: 12px 20px;
      border-radius: 12px;
      font-weight: bold;
      border: 2px solid #e2e8f0;
    }

    .date {
      color: #64748b;
      font-weight: normal;
    }

    .decorative-element {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
      border-radius: 50%;
      border: 3px solid rgba(102, 126, 234, 0.3);
    }
  </style>
  <title>{{channel_name}} - News</title>
</head>

<body class="lang-ta">
  <div class="container">
    <div class="image-section">
      <img src="{{image_url}}" alt="News Image" class="news-image" />
      <div class="image-overlay"></div>
    </div>
    <div class="content-section">
      <div class="decorative-element"></div>
      <div class="header">
        <div class="category-badge">{{category}}</div>
      </div>
      <div class="headline-wrap">
        <div class="headline">{{content}}</div>
      </div>
      <div class="footer">
        <div class="source">{{source}}</div>
        <div class="date">{{date}}</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/kishorek/dynamic-font-size-js@refs/heads/main/fontfit.js"></script>
  <script>
    const container = document.querySelector(".headline-wrap");
    const headline = document.querySelector(".headline");
    const controller = window.fitFontToContainer(headline, container, {
      minPx: 8,
      maxPx: 80,
    });
    requestAnimationFrame(() => controller.refit());
  </script>
</body>
</html>
