<!DOCTYPE html>
<html lang="{{lang}}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    @font-face {
      font-family: "TAMIL-UNI013";
      src: url("https://newsit-assets.s3.ap-south-1.amazonaws.com/template/TAMIL-UNI013.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Grotesk";
      src: url("https://techoffee-public-1.s3.us-east-1.amazonaws.com/newsit/Grotesk-Medium.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    /* Reset */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body.lang-ta {
      font-family: "TAMIL-UNI013", system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans", Arial, sans-serif;
      font-weight: 400;
    }
    body.lang-en {
      font-family: "Grotesk", system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans", Arial, sans-serif;
      font-weight: 700;
    }

    /* Container: Full screen */
    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #ffffff;
      overflow: hidden;
    }

    /* Top image area: responsive height, based on container height */
    .image-section {
      position: relative;
      width: 100%;
      /* Clamp relative to container height via vh proxy; works since container <= viewport */
      height: clamp(35%, 45%, 55%);
      overflow: hidden;
    }

    .news-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .image-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.12) 0%, rgba(0,0,0,0.32) 65%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
    }

    .category-badge {
      position: absolute;
      top: clamp(8px, 2.5vw, 20px);
      left: clamp(8px, 2.5vw, 20px);
      background: #e11d48;
      color: #ffffff;
      font-weight: 700;
      font-size: clamp(14px, 2vw, 18px);
      line-height: 1;
      padding: clamp(6px, 1vw, 8px) clamp(10px, 1.6vw, 16px);
      border-radius: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      z-index: 2;
      font-family: sans-serif;
      white-space: nowrap;
    }

    .content-section {
      /* Remaining height below image */
      height: calc(100% - clamp(35%, 45%, 55%));
      display: flex;
      flex-direction: column;
      padding: clamp(16px, 3.7vw, 40px);
      gap: clamp(10px, 2.2vw, 20px);
    }

    /* Headline grows but won’t push footer off-screen */
    .headline-wrap {
      overflow: hidden;
      min-height: 0;
      flex: 1 1 auto;            /* allow it to grow/shrink */
    }

    .headline {
      color: #1f2937;
      font-size: clamp(24px, 8vw, 85px);
      line-height: 1.25;
      font-weight: 700;
      min-height: 0;             /* enables proper flex overflow */
      display: flex;
      align-items: center;
      word-break: break-word;
      overflow: auto;            /* if text is extremely long, scroll inside instead of hiding footer */
      scrollbar-width: thin;
    }

    .footer {
      flex: 0 0 auto;            /* footer is fixed height; always visible */
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      padding-top: clamp(10px, 2vw, 20px);
      border-top: 2px solid #e5e7eb;
      font-size: clamp(14px, 2vw, 18px);
      color: #6b7280;
      font-family: sans-serif;
      font-weight: 700;
      flex-wrap: wrap;
    }

    .source {
      background: #f3f4f6;
      color: #374151;
      padding: clamp(6px, 1.6vw, 8px) clamp(10px, 2.2vw, 16px);
      border-radius: 20px;
      font-weight: 700;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .date {
      color: #9ca3af;
      white-space: nowrap;
    }

    @media (max-width: 640px) {
      .headline { line-height: 1.3; }
      .footer { align-items: flex-start; }
    }
  </style>
  <title>{{channel_name}} - News</title>
</head>

<body class="lang-ta">
  <div class="container">
    <div class="image-section">
      <img src="{{image_url}}" alt="News Image" class="news-image" />
      <div class="image-overlay"></div>
      <div class="category-badge">{{category}}</div>
    </div>
    <div class="content-section">
      <div class="headline-wrap">
        <div class="headline">{{content}}</div>
      </div>
      <div class="footer">
        <div class="source">{{source}}</div>
        <div class="date">{{date}}</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/kishorek/dynamic-font-size-js@refs/heads/main/fontfit.js"></script>
  <script>
    const container = document.querySelector(".headline-wrap");
    const headline = document.querySelector(".headline");

    // Fit within content area; headline also has overflow:auto as a last resort
    const controller = window.fitFontToContainer(headline, container, {
      minPx: 14,
      maxPx: 80
    });

    const refit = () => controller.refit();

    // Initial fit
    requestAnimationFrame(refit);

    // Refit on resize and orientation changes
    let rafId;
    const scheduleRefit = () => {
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(refit);
    };
    window.addEventListener("resize", scheduleRefit);
    window.addEventListener("orientationchange", scheduleRefit);

    // Refit after image loads, in case dimensions affect layout
    const img = document.querySelector(".news-image");
    if (img && !img.complete) {
      img.addEventListener("load", scheduleRefit, { once: true });
    }
  </script>
</body>
</html>
