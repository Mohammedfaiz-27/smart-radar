<!DOCTYPE html>
<html lang="{{lang}}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @font-face {
      font-family: "TAMIL-UNI013";
      src: url("https://newsit-assets.s3.ap-south-1.amazonaws.com/template/TAMIL-UNI013.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: "Grotesk";
      src: url("https://techoffee-public-1.s3.us-east-1.amazonaws.com/newsit/Grotesk-Medium.ttf") format("truetype");
      font-weight: bold;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #0c4a6e 0%, #1e3a8a 50%, #7c3aed 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
    }

    body.lang-ta {
      font-family: "TAMIL-UNI013", sans-serif;
    }

    body.lang-en {
      font-family: "Grotesk", sans-serif;
      font-weight: bold;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .background-section {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 65%;
      overflow: hidden;
    }

    .background-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.4) saturate(1.2);
    }

    .news-ticker {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: linear-gradient(90deg, #dc2626, #ef4444);
      display: flex;
      align-items: center;
      padding: 0 clamp(25px, 4vw, 40px);
      z-index: 10;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .breaking-news {
      color: white;
      font-size: clamp(18px, 3vw, 24px);
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-family: sans-serif;
      background: rgba(255, 255, 255, 0.2);
      padding: 8px 20px;
      border-radius: 8px;
      margin-right: 30px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .category-badge {
      position: absolute;
      top: clamp(80px, 10vw, 100px);
      right: clamp(25px, 4vw, 40px);
      background: rgba(255, 255, 255, 0.95);
      color: #1f2937;
      font-weight: bold;
      font-size: clamp(14px, 2vw, 18px);
      padding: 15px 30px;
      border-radius: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: sans-serif;
      z-index: 5;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
    }

    .content-section {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 35%;
      background: #ffffff;
      padding: clamp(30px, 5vw, 50px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .headline-wrap {
      overflow: hidden;
      min-height: 0;
    }

    .headline {
      color: #1f2937;
      font-size: clamp(24px, 8vw, 85px);
      line-height: 1.2;
      font-weight: bold;
      flex-grow: 1;
      display: flex;
      align-items: center;
      margin-bottom: clamp(20px, 3vw, 30px);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: clamp(20px, 3vw, 25px);
      border-top: 4px solid #dc2626;
      font-family: sans-serif;
    }

    .source-info {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .source {
      background: linear-gradient(135deg, #dc2626, #ef4444);
      color: white;
      padding: 12px 25px;
      border-radius: 25px;
      font-weight: bold;
      font-size: clamp(18px, 3vw, 24px);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .live-indicator {
      background: #10b981;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0.5; }
    }

    .date-time {
      color: #4b5563;
      font-size: clamp(18px, 3vw, 24px);
      font-weight: bold;
    }

    .gradient-overlay {
      position: absolute;
      bottom: 35%;
      left: 0;
      width: 100%;
      height: 150px;
      background: linear-gradient(to bottom, transparent 0%, rgba(255, 255, 255, 0.8) 60%, rgba(255, 255, 255, 1) 100%);
      z-index: 2;
    }

    .corner-graphics {
      position: absolute;
      top: clamp(80px, 10vw, 100px);
      left: clamp(25px, 4vw, 40px);
      width: 60px;
      height: 60px;
      background: linear-gradient(45deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.1));
      transform: rotate(45deg);
      border-radius: 8px;
      z-index: 3;
    }
  </style>
  <title>{{channel_name}} - Breaking News</title>
</head>

<body class="lang-ta">
  <div class="container">
    <div class="news-ticker">
      <div class="breaking-news">Breaking News</div>
      <div class="live-indicator">● LIVE</div>
    </div>

    <div class="background-section">
      <img src="{{image_url}}" alt="News Background" class="background-image" />
      <div class="corner-graphics"></div>
    </div>

    <div class="category-badge">{{category}}</div>
    <div class="gradient-overlay"></div>

    <div class="content-section">
      <div class="headline-wrap">
        <div class="headline">{{content}}</div>
      </div>
      <div class="footer">
        <div class="source-info">
          <div class="source">{{source}}</div>
        </div>
        <div class="date-time">{{date}}</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/kishorek/dynamic-font-size-js@refs/heads/main/fontfit.js"></script>
  <script>
    const container = document.querySelector(".headline-wrap");
    const headline = document.querySelector(".headline");
    const controller = window.fitFontToContainer(headline, container, {
      minPx: 8,
      maxPx: 80,
    });
    requestAnimationFrame(() => controller.refit());
  </script>
</body>
</html>
