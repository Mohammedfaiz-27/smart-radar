<!DOCTYPE html>
<html lang="{{lang}}">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @font-face {
      font-family: "TAMIL-UNI013";
      src: url("https://newsit-assets.s3.ap-south-1.amazonaws.com/template/TAMIL-UNI013.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: "Grotesk";
      src: url("https://techoffee-public-1.s3.us-east-1.amazonaws.com/newsit/Grotesk-Medium.ttf") format("truetype");
      font-weight: bold;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      padding: 0;
      margin: 0;
      overflow: hidden;
    }

    body.lang-ta {
      font-family: "TAMIL-UNI013", sans-serif;
    }

    body.lang-en {
      font-family: "Grotesk", sans-serif;
      font-weight: bold;
    }

    .container {
      position: relative;
      text-align: center;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .inner-container {
      position: relative;
      text-align: center;
      color: #1f2937;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: start;
      flex-direction: column;
    }

    .heading-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 40px;
      background: linear-gradient(135deg, #1a365d, #2c5aa0);
      border-bottom: 4px solid #3182ce;
    }

    .footer-row {
      width: 100%;
      height: 80px;
      display: flex;
      align-items: end;
      justify-content: stretch;
      margin-top: auto;
      padding: 0 clamp(20px, 4vw, 40px) 20px;
      background: #f7fafc;
      border-top: 1px solid #e2e8f0;
    }

    .inner-footer-row {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0 clamp(20px, 4vw, 40px);
    }

    .inner-footer-row>div {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .pill {
      padding: 8px 20px;
      background: rgba(31, 41, 55, 0.1);
      border: 2px solid rgba(31, 41, 55, 0.8);
      border-radius: 6px;
      color: rgba(31, 41, 55, 0.9);
      font-size: clamp(14px, 2vw, 18px);
      font-family: sans-serif;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .news {
      color: #ffffff;
      font-size: clamp(20px, 3vw, 28px);
      font-weight: bold;
      background: rgba(255, 255, 255, 0.15);
      padding: 12px 28px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      text-transform: uppercase;
      font-family: sans-serif;
      letter-spacing: 1px;
      backdrop-filter: blur(10px);
    }

    .centered {
      color: white;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: clamp(20px, 4vw, 40px) clamp(25px, 5vw, 50px);
      flex-grow: 1;
      flex-direction: column;
      background:
        linear-gradient(135deg, rgba(49, 130, 206, 0.03) 0%, transparent 100%);
    }

    .headline-wrap {
      overflow: hidden;
      min-height: 0;
    }

    .centered span {
      /* max-width: 100%;
      max-height: 100%; */
      font-size: clamp(24px, 8vw, 85px);
      line-height: 1.15;
      word-wrap: break-word;
      margin-bottom: 12px;
      font-weight: 700;
      color: white;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .brand-stripe {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 8px;
      background: linear-gradient(180deg, #3182ce, #2c5aa0);
    }

    .accent-box {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, rgba(49, 130, 206, 0.1), rgba(44, 90, 160, 0.1));
      border: 2px solid rgba(49, 130, 206, 0.2);
      border-radius: 8px;
    }

    .corner-decoration {
      position: absolute;
      bottom: 30px;
      right: 30px;
      width: 0;
      height: 0;
      border-left: 30px solid transparent;
      border-right: 30px solid transparent;
      border-bottom: 30px solid #3182ce;
      opacity: 0.1;
    }
  </style>
  <title>{{channel_name}} - Business Report</title>
</head>

<body class="lang-ta">
  <div class="container">
    <div class="inner-container">
      <div class="brand-stripe"></div>
      <div class="accent-box"></div>
      <div class="corner-decoration"></div>
      <div class="heading-row">
        <div class="news">{{category}}</div>
      </div>
      <div class="centered">
        <div class="headline-wrap">
          <span>{{content}}</span>
        </div>
      </div>
      <div class="footer-row">
        <div class="inner-footer-row">
          <div>
            <div class="pill">{{source}}</div>
            <div class="pill date">
              <div>{{date}}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/kishorek/dynamic-font-size-js@refs/heads/main/fontfit.js"></script>
  <script>
    const container = document.querySelector(".headline-wrap");
    const headline = document.querySelector(".centered span");
    const controller = window.fitFontToContainer(headline, container, {
      minPx: 8,
      maxPx: 80,
    });
    requestAnimationFrame(() => controller.refit());
  </script>
</body>

</html>
