<script>
    let currentCity = '';
    let cityData = {};

    // Normalize Plotly layout to avoid deprecated keys (e.g., titlefont, titlefont_size)
    function sanitizePlotlyLayout(inputLayout) {
        try {
            const layout = JSON.parse(JSON.stringify(inputLayout || {}));

            // Ensure title object shape
            if (typeof layout.title === 'string') {
                layout.title = { text: layout.title };
            } else if (!layout.title) {
                layout.title = {};
            }

            // Migrate deprecated top-level titlefont to title.font
            if (layout.titlefont && typeof layout.titlefont === 'object') {
                layout.title.font = Object.assign({}, layout.title.font || {}, layout.titlefont);
                delete layout.titlefont;
            }

            // Handle flattened legacy key titlefont_size if present
            if (Object.prototype.hasOwnProperty.call(layout, 'titlefont_size')) {
                const size = layout.titlefont_size;
                if (typeof size === 'number') {
                    layout.title.font = Object.assign({}, layout.title.font || {}, { size });
                }
                delete layout.titlefont_size;
            }

            return layout;
        } catch (e) {
            return inputLayout || {};
        }
    }

    // Load city data from localStorage
    function loadCityData(city) {
        const stored = localStorage.getItem(`cityData_${city}`);
        return stored ? JSON.parse(stored) : {};
    }

    // Save city data to localStorage
    function saveCityData(city, data) {
        localStorage.setItem(`cityData_${city}`, JSON.stringify(data));
        // Also save the most recent city and timestamp
        localStorage.setItem('mostRecentCity', city);
        localStorage.setItem('mostRecentCityTimestamp', Date.now().toString());
    }

    // Get the most recent city from localStorage
    function getMostRecentCity() {
        const recentCity = localStorage.getItem('mostRecentCity');
        const timestamp = localStorage.getItem('mostRecentCityTimestamp');

        if (recentCity && timestamp) {
            // Check if the data is less than 24 hours old
            const now = Date.now();
            const dataAge = now - parseInt(timestamp);
            const twentyFourHours = 24 * 60 * 60 * 1000;

            if (dataAge < twentyFourHours) {
                return recentCity;
            }
        }

        return null;
    }

    // Load most recent city data automatically
    function autoLoadRecentCity() {
        const recentCity = getMostRecentCity();
        if (recentCity) {
            const storedData = loadCityData(recentCity);
            if (storedData && Object.keys(storedData).length > 0) {
                // Set current city and data
                currentCity = recentCity;
                cityData = storedData;

                // Update the input field
                document.getElementById('cityInput').value = recentCity;

                // Initialize results container
                initializeResultsContainer(recentCity);

                // Load available data
                if (cityData.research) {
                    displayResearchResults(cityData.research);
                }

                // Show cache indicator and timestamp
                const cacheIndicator = document.getElementById('cacheIndicator');
                const lastUpdated = document.getElementById('lastUpdated');
                if (cacheIndicator) {
                    cacheIndicator.style.display = 'inline-block';
                }
                if (lastUpdated) {
                    const timestamp = localStorage.getItem('mostRecentCityTimestamp');
                    if (timestamp) {
                        const date = new Date(parseInt(timestamp));
                        lastUpdated.textContent = `Last updated: ${date.toLocaleString()}`;
                        lastUpdated.style.display = 'inline-block';
                    }
                }

                // Show notification
                showSuccess(`📍 Restored previous session for ${recentCity}`);

                return true;
            }
        }
        return false;
    }

    async function researchCity() {
        const city = document.getElementById('cityInput').value;
        if (!city) {
            showError('Please enter a city name');
            return;
        }

        currentCity = city;
        cityData = loadCityData(city);

        // Initialize the results container
        initializeResultsContainer(city);

        // If we have cached research data, display it
        if (cityData.research) {
            displayResearchResults(cityData.research);
            // Show cache indicator and timestamp
            const cacheIndicator = document.getElementById('cacheIndicator');
            const lastUpdated = document.getElementById('lastUpdated');
            if (cacheIndicator) {
                cacheIndicator.style.display = 'inline-block';
            }
            if (lastUpdated) {
                const timestamp = localStorage.getItem('mostRecentCityTimestamp');
                if (timestamp) {
                    const date = new Date(parseInt(timestamp));
                    lastUpdated.textContent = `Last updated: ${date.toLocaleString()}`;
                    lastUpdated.style.display = 'inline-block';
                }
            }
            showSuccess('Research data loaded from cache!');
            return;
        }

        // Hide cache indicator and timestamp for fresh data
        const cacheIndicator = document.getElementById('cacheIndicator');
        const lastUpdated = document.getElementById('lastUpdated');
        if (cacheIndicator) {
            cacheIndicator.style.display = 'none';
        }
        if (lastUpdated) {
            lastUpdated.style.display = 'none';
        }

        showLoading('Researching city...', 'Gathering comprehensive data about ' + city);
        try {
            const response = await fetch('/research', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `city=${encodeURIComponent(city)}`
            });

            const data = await response.json();
            cityData.research = data;
            saveCityData(city, cityData);
            displayResearchResults(data);
            showSuccess('Research completed successfully!');
        } catch (error) {
            console.error('Error:', error);
            showError('Failed to fetch research data. Please try again.');
        } finally {
            hideLoading();
        }
    }

    async function generateGraph() {
        if (!currentCity) {
            showError('Please search for a city first');
            return;
        }

        // Check if we have cached graph data
        if (cityData.graph) {
            displayGraph(cityData.graph);
            showSuccess('Knowledge graph loaded from cache!');
            return;
        }

        showLoading('Generating knowledge graph...', 'Creating visual connections for ' + currentCity);
        try {
            const openaiAnalysis = cityData.research?.openai_analysis || '';
            const perplexityResearch = cityData.research?.perplexity_research || '';

            const response = await fetch('/generate-graph', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `city=${encodeURIComponent(currentCity)}&openai_analysis=${encodeURIComponent(openaiAnalysis)}&perplexity_research=${encodeURIComponent(perplexityResearch)}`
            });

            const data = await response.json();
            if (data && data.layout) {
                data.layout = sanitizePlotlyLayout(data.layout);
            }
            cityData.graph = data;
            saveCityData(currentCity, cityData);
            displayGraph(data);
            showSuccess('Knowledge graph generated successfully!');
        } catch (error) {
            console.error('Error:', error);
            showError('Failed to generate knowledge graph. Please try again.');
        } finally {
            hideLoading();
        }
    }

    function displayGraph(data) {
        // Show regenerate header and hide generate button
        const graphHeader = document.getElementById('graphHeader');
        const graphGenerateBtn = document.getElementById('graphGenerateBtn');
        if (graphHeader) graphHeader.style.display = 'flex';
        if (graphGenerateBtn) graphGenerateBtn.style.display = 'none';

        const container = document.getElementById('graphContent');
        container.innerHTML = `
            <div class="graph-container">
                <div id="knowledgeGraph" style="width: 100%; height: 600px;"></div>
            </div>
        `;

        // Prefer D3 interactive graph if graph_data exists
        if (data.graph_data && data.graph_data.nodes && data.graph_data.edges) {
            renderD3Graph('knowledgeGraph', data.graph_data);
        } else if (data.traces && data.layout) {
            // Fallback to existing Plotly rendering if only traces/layout are present
            const safeLayout = sanitizePlotlyLayout(data.layout);
            Plotly.newPlot('knowledgeGraph', data.traces, safeLayout, { responsive: true });
        } else {
            document.getElementById('knowledgeGraph').innerHTML = '<div class="text-muted">No graph data available.</div>';
        }
    }

    function renderD3Graph(containerId, graphData) {
        const container = document.getElementById(containerId);
        const width = container.clientWidth;
        const height = container.clientHeight;

        // Clear previous content
        container.innerHTML = '';

        const svg = d3.select(container)
            .append('svg')
            .attr('width', width)
            .attr('height', height)
            .style('border-radius', '12px');

        const zoomGroup = svg.append('g');

        const zoom = d3.zoom()
            .scaleExtent([0.2, 5])
            .on('zoom', (event) => {
                zoomGroup.attr('transform', event.transform);
            });
        svg.call(zoom);

        // Build color scale by node type
        const types = Array.from(new Set((graphData.nodes || []).map(n => n.type || 'default')));
        const palette = d3.schemeTableau10 || d3.schemeCategory10;
        const color = d3.scaleOrdinal(palette).domain(types);

        // Tooltip (ensure only one instance)
        d3.selectAll('body > div.d3-tooltip').remove();
        const tooltip = d3.select('body')
            .append('div')
            .attr('class', 'd3-tooltip')
            .style('position', 'fixed')
            .style('pointer-events', 'none')
            .style('z-index', 10000)
            .style('padding', '8px 10px')
            .style('background', 'rgba(0,0,0,0.85)')
            .style('color', '#fff')
            .style('border-radius', '8px')
            .style('font-size', '12px')
            .style('opacity', 0);

        // Legend
        const legend = svg.append('g').attr('transform', `translate(${width - 160}, 16)`);
        types.forEach((t, i) => {
            const g = legend.append('g').attr('transform', `translate(0, ${i * 20})`);
            g.append('rect').attr('width', 12).attr('height', 12).attr('rx', 3).attr('fill', color(t));
            g.append('text').attr('x', 18).attr('y', 10).attr('fill', '#ddd').attr('font-size', 12).text(t);
        });

        // Prepare simulation
        const nodes = (graphData.nodes || []).map(n => ({ ...n }));
        const links = (graphData.edges || []).map(e => ({ source: e.source, target: e.target, ...e }));

        const simulation = d3.forceSimulation(nodes)
            .force('link', d3.forceLink(links).id(d => d.id).distance(d => 60 + (100 - Math.min(80, (d.size || 20))))
                .strength(0.15))
            .force('charge', d3.forceManyBody().strength(-220))
            .force('center', d3.forceCenter(width / 2, height / 2))
            .force('collision', d3.forceCollide().radius(d => (d.size || 12) + 8));

        // Draw links with gradients
        const defs = svg.append('defs');
        links.forEach((link, i) => {
            const grad = defs.append('linearGradient').attr('id', `grad-${i}`);
            const srcId = (typeof link.source === 'object' && link.source !== null) ? link.source.id : link.source;
            const tgtId = (typeof link.target === 'object' && link.target !== null) ? link.target.id : link.target;
            const srcType = (nodes.find(n => n.id === srcId)?.type) || 'default';
            const tgtType = (nodes.find(n => n.id === tgtId)?.type) || 'default';
            grad.append('stop').attr('offset', '0%').attr('stop-color', color(srcType));
            grad.append('stop').attr('offset', '100%').attr('stop-color', color(tgtType));
        });

        const link = zoomGroup.append('g')
            .attr('stroke-linecap', 'round')
            .selectAll('path')
            .data(links)
            .join('path')
            .attr('stroke', (d, i) => `url(#grad-${i})`)
            .attr('stroke-width', 2)
            .attr('opacity', 0.7);

        // Link labels
        const linkLabels = zoomGroup.append('g')
            .selectAll('text')
            .data(links)
            .join('text')
            .attr('fill', '#aaa')
            .attr('font-size', 11)
            .attr('text-anchor', 'middle')
            .text(d => d.relationship || '');

        // Node groups
        const nodeGroup = zoomGroup.append('g')
            .selectAll('g')
            .data(nodes)
            .join('g')
            .attr('cursor', 'pointer')
            .call(d3.drag()
                .on('start', (event, d) => {
                    if (!event.active) simulation.alphaTarget(0.3).restart();
                    d.fx = d.x; d.fy = d.y;
                })
                .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
                .on('end', (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

        nodeGroup.append('circle')
            .attr('r', d => Math.max(10, d.size || 14))
            .attr('fill', d => color(d.type || 'default'))
            .attr('stroke', '#fff')
            .attr('stroke-width', 2)
            .attr('filter', 'url(#shadow)');

        // Node labels
        nodeGroup.append('text')
            .attr('x', 0)
            .attr('y', d => -Math.max(12, (d.size || 14)) - 4)
            .attr('text-anchor', 'middle')
            .attr('fill', '#e5e7eb')
            .attr('font-weight', 600)
            .attr('font-size', 12)
            .text(d => d.label || d.id);

        // Hover effects and tooltips
        nodeGroup
            .on('mouseenter', (event, d) => {
                tooltip.style('opacity', 1)
                    .html(`<strong>${d.label || d.id}</strong><br/>${d.description || ''}`);
                // Neighbor highlighting
                const neighborIds = new Set([d.id]);
                links.forEach(l => {
                    const s = (typeof l.source === 'object') ? l.source.id : l.source;
                    const t = (typeof l.target === 'object') ? l.target.id : l.target;
                    if (s === d.id) neighborIds.add(t);
                    if (t === d.id) neighborIds.add(s);
                });
                nodeGroup.selectAll('circle').attr('opacity', n => neighborIds.has(n.id) ? 1 : 0.15);
                link.attr('opacity', l => {
                    const s = (typeof l.source === 'object') ? l.source.id : l.source;
                    const t = (typeof l.target === 'object') ? l.target.id : l.target;
                    return (s === d.id || t === d.id) ? 0.9 : 0.1;
                });
                linkLabels.attr('opacity', l => {
                    const s = (typeof l.source === 'object') ? l.source.id : l.source;
                    const t = (typeof l.target === 'object') ? l.target.id : l.target;
                    return (s === d.id || t === d.id) ? 1 : 0;
                });
            })
            .on('mouseleave', () => {
                tooltip.style('opacity', 0);
                nodeGroup.selectAll('circle').attr('opacity', 1);
                link.attr('opacity', 0.7);
                linkLabels.attr('opacity', 1);
            })
            .on('mousemove', (event) => {
                tooltip.style('left', `${event.clientX + 12}px`).style('top', `${event.clientY + 12}px`);
            })
            .on('click', (event, d) => {
                showSuccess(`Node: ${d.label || d.id}`);
            });

        simulation.on('tick', () => {
            link.attr('d', d => `M${d.source.x},${d.source.y} L${d.target.x},${d.target.y}`);
            linkLabels.attr('x', d => (d.source.x + d.target.x) / 2)
                .attr('y', d => (d.source.y + d.target.y) / 2 - 4);
            nodeGroup.attr('transform', d => `translate(${d.x},${d.y})`);
        });

        // Resize handling
        const resizeObserver = new ResizeObserver(() => {
            const w = container.clientWidth;
            const h = container.clientHeight;
            svg.attr('width', w).attr('height', h);
            simulation.force('center', d3.forceCenter(w / 2, h / 2)).alpha(0.2).restart();
        });
        resizeObserver.observe(container);

        // Drop shadow filter
        const filter = defs.append('filter').attr('id', 'shadow').attr('height', '130%');
        filter.append('feDropShadow').attr('dx', 0).attr('dy', 2).attr('stdDeviation', 2).attr('flood-color', '#000').attr('flood-opacity', 0.35);
    }

    // Regeneration functions
    async function regenerateResearch() {
        if (!currentCity) {
            showError('Please search for a city first');
            return;
        }

        // Clear research data from cache
        delete cityData.research;
        // Also clear dependent data
        delete cityData.posts;
        delete cityData.liveNews;
        saveCityData(currentCity, cityData);

        // Reset posts UI if visible
        const postsHeader = document.getElementById('postsHeader');
        const postsPlaceholder = document.getElementById('postsPlaceholder');
        if (postsHeader) postsHeader.style.display = 'none';
        if (postsPlaceholder) postsPlaceholder.style.display = 'block';

        // Regenerate research
        showLoading('Regenerating research...', 'Fetching fresh data for ' + currentCity);
        try {
            const response = await fetch('/research', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `city=${encodeURIComponent(currentCity)}`
            });

            const data = await response.json();
            cityData.research = data;
            saveCityData(currentCity, cityData);
            displayResearchResults(data);
            showSuccess('Research regenerated successfully!');
        } catch (error) {
            console.error('Error:', error);
            showError('Failed to regenerate research data. Please try again.');
        } finally {
            hideLoading();
        }
    }

                html += `<div class="news-content mb-2">${message.substring(0, 200)}${message.length > 200 ? '...' : ''}</div>`;
                html += `<div class="news-meta d-flex justify-content-between align-items-center mb-2">`;
                html += `<small class="text-muted">By: ${author}</small>`;
                html += `<div class="reactions">`;
                html += `<small class="text-muted me-2"><i class="fas fa-thumbs-up"></i> ${reactions}</small>`;
                html += `<small class="text-muted"><i class="fas fa-comment"></i> ${comments}</small>`;
                html += `</div>`;
                html += `</div>`;
                html += `<div class="d-flex justify-content-end">`;
                html += `<button class="btn btn-sm btn-primary live-news-post-btn" data-content="${message.replace(/"/g, '&quot;').replace(/'/g, '&#x27;')}" data-source="Facebook - ${author}">`;
                html += `<i class="fas fa-arrow-right me-1"></i>Post to Social</button>`;
                html += `</div>`;
                html += `</div>`;
            });
            html += '</div></div>';
        }

        // Twitter Posts
        if (data.twitter_posts && data.twitter_posts.result && data.twitter_posts.result.timeline &&
            data.twitter_posts.result.timeline.instructions && data.twitter_posts.result.timeline.instructions.length > 0) {
            const entries = data.twitter_posts.result.timeline.instructions[0].entries || [];
            const tweetEntries = entries.filter(entry => entry.entryId.startsWith('tweet-'));

            if (tweetEntries.length > 0) {
                html += '<div class="col-lg-6">';
                html += '<div class="platform-section">';
                html += '<div class="platform-header mb-3">';
                html += '<i class="fab fa-twitter fa-lg me-2 text-info"></i>';
                html += '<h6 class="mb-0">Twitter Live News</h6>';
                html += '</div>';

                tweetEntries.slice(0, 5).forEach((entry, index) => {
                    const tweet = entry.content?.itemContent?.tweet_results?.result;
                    if (tweet && tweet.legacy) {
                        const fullText = tweet.legacy.full_text || 'No content';
                        const author = tweet.core?.user_results?.result?.legacy?.name || 'Unknown';
                        const screenName = tweet.core?.user_results?.result?.legacy?.screen_name || '';
                        const favorites = tweet.legacy.favorite_count || 0;
                        const retweets = tweet.legacy.retweet_count || 0;

                        html += `<div class="live-news-item mb-3 p-3 bg-elevated rounded">`;
                        html += `<div class="news-content mb-2">${fullText.substring(0, 200)}${fullText.length > 200 ? '...' : ''}</div>`;
                        html += `<div class="news-meta d-flex justify-content-between align-items-center mb-2">`;
                        html += `<small class="text-muted">By: ${author} ${screenName ? '@' + screenName : ''}</small>`;
                        html += `<div class="reactions">`;
                        html += `<small class="text-muted me-2"><i class="fas fa-heart"></i> ${favorites}</small>`;
                        html += `<small class="text-muted"><i class="fas fa-retweet"></i> ${retweets}</small>`;
                        html += `</div>`;
                        html += `</div>`;
                        html += `<div class="d-flex justify-content-end">`;
                        html += `<button class="btn btn-sm btn-primary live-news-post-btn" data-content="${fullText.replace(/"/g, '&quot;').replace(/'/g, '&#x27;')}" data-source="Twitter - ${author}">`;
                        html += `<i class="fas fa-arrow-right me-1"></i>Post to Social</button>`;
                        html += `</div>`;
                        html += `</div>`;
                    }
                });
                html += '</div></div>';
            }
        }

        if (!data.facebook_posts?.results?.length && !data.twitter_posts?.result?.timeline?.instructions?.length) {
            html += '<div class="col-12">';
            html += '<div class="text-center text-muted py-4">';
            html += '<i class="fas fa-exclamation-circle fa-2x mb-3"></i>';
            html += '<p>No live news found for this city. Try a different search term.</p>';
            html += '</div>';
            html += '</div>';
        }

        html += '</div>';
        container.innerHTML = html;
    }

    // Add event delegation for post buttons and auto-load recent city
    document.addEventListener('DOMContentLoaded', function () {
        // Auto-load the most recent city data
        setTimeout(() => {
            autoLoadRecentCity();
        }, 500); // Small delay to ensure UI is ready

        // Event delegation for post buttons
        document.addEventListener('click', function (e) {
            if (e.target.closest('.post-btn') || e.target.closest('.live-news-post-btn')) {
                const button = e.target.closest('.post-btn') || e.target.closest('.live-news-post-btn');
                const content = button.getAttribute('data-content');
                const source = button.getAttribute('data-source');
                if (content) {
                    // Add source attribution if available
                    const finalContent = source ? `${content}\n\n📰 Source: ${source}` : content;
                    loadPostContent(finalContent);
                }
            }
        });
    });
</script>
