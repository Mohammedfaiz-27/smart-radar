{% extends "base.html" %}

{% block title %}Content Publisher - OmniPush{% endblock %}

{% block content %}


<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="publisher-card card fade-in-delay-1">
            <div class="card-body p-5">
                <div class="publisher-header text-center mb-4">
                    <div class="publisher-icon mb-3">
                        <i class="fas fa-pen-fancy fa-2x text-primary"></i>
                    </div>
                    <h3 class="mb-2">Create Content</h3>
                    <p class="text-muted">Craft engaging posts for social media</p>
                </div>

                <form id="postForm">
                    <div class="content-section mb-5">
                        <div class="form-group">
                            <label for="contentInput" class="form-label">
                                <i class="fas fa-edit me-2"></i>Your Content
                            </label>
                            <div class="content-input-wrapper">
                                <textarea class="form-control form-control-lg" id="contentInput" rows="6"
                                    placeholder="Write your content here... Tell a story, share insights, or announce something exciting!"></textarea>
                                <div class="content-actions mt-3">
                                    <button type="button" class="btn btn-outline-primary btn-sm"
                                        onclick="clearContent()">
                                        <i class="fas fa-eraser me-1"></i>Clear
                                    </button>
                                    <button type="button" class="btn btn-outline-info btn-sm" onclick="addEmoji()">
                                        <i class="fas fa-smile me-1"></i>Emoji
                                    </button>
                                    <span class="char-count text-muted ms-auto">
                                        <span id="charCount">0</span> characters
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Platform selection removed: backend auto-posts using configured defaults -->

                    <div class="action-buttons fade-in-delay-2">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <button type="button"
                                    class="btn btn-warning btn-lg w-100 h-100 d-flex flex-column align-items-center justify-content-center"
                                    id="generateContentBtn" onclick="generateContent()">
                                    <i class="fas fa-sparkles fa-2x mb-2"></i>
                                    <span class="fw-bold">Enhance</span>
                                    <small class="text-light opacity-75">AI Polish</small>
                                </button>
                            </div>
                            <div class="col-md-3">
                                <button type="button"
                                    class="btn btn-success btn-lg w-100 h-100 d-flex flex-column align-items-center justify-content-center"
                                    id="generateHtmlBtn" onclick="generateHTML()">
                                    <i class="fas fa-eye fa-2x mb-2"></i>
                                    <span class="fw-bold">Preview</span>
                                    <small class="text-light opacity-75">Live View</small>
                                </button>
                            </div>
                            <div class="col-md-3">
                                <button type="button"
                                    class="btn btn-info btn-lg w-100 h-100 d-flex flex-column align-items-center justify-content-center"
                                    id="generateImageBtn" onclick="generateImage()" disabled>
                                    <i class="fas fa-camera fa-2x mb-2"></i>
                                    <span class="fw-bold">News Card</span>
                                    <small class="text-light opacity-75">Capture</small>
                                </button>
                            </div>
                            <div class="col-md-3">
                                <button type="button"
                                    class="btn btn-primary btn-lg w-100 h-100 d-flex flex-column align-items-center justify-content-center"
                                    id="postToSocialBtn" onclick="postToSocial()" disabled>
                                    <i class="fas fa-rocket fa-2x mb-2"></i>
                                    <span class="fw-bold">Publish</span>
                                    <small class="text-light opacity-75">Go Live</small>
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Results Section -->
<div class="results-section">
    <div id="postResults"></div>
    <div id="screenshotPreview"></div>
</div>

<!-- Platform selection modal removed -->

<!-- HTML Preview Modal -->
<div class="modal fade" id="htmlPreviewModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-eye me-2"></i>Content Preview
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="preview-container">
                    <div class="preview-header mb-3">
                        <div class="preview-controls">
                            <button class="btn btn-sm btn-outline-primary" onclick="switchPreview('desktop')">
                                <i class="fas fa-desktop me-1"></i>Desktop
                            </button>
                            <button class="btn btn-sm btn-outline-primary" onclick="switchPreview('mobile')">
                                <i class="fas fa-mobile-alt me-1"></i>Mobile
                            </button>
                        </div>
                    </div>
                    <div id="htmlPreviewContent" class="preview-content">
                        <iframe id="htmlPreviewFrame"
                            style="width:100%;height:600px;border:0;border-radius:8px;background:#fff;"></iframe>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" onclick="proceedToImage()">
                    <i class="fas fa-arrow-right me-2"></i>Generate News Card
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    // Check for content passed from home page and initialize button states
    document.addEventListener('DOMContentLoaded', function() {
        const storedContent = localStorage.getItem('postContent');
        if (storedContent) {
            document.getElementById('contentInput').value = storedContent;
            // Clear the stored content after loading
            localStorage.removeItem('postContent');
            // Trigger character count update and button state
            const event = new Event('input', { bubbles: true });
            document.getElementById('contentInput').dispatchEvent(event);
            // Show success message
            showSuccess('Content loaded from social posts!');
        } else {
            // Initialize button state for empty content
            document.getElementById('generateHtmlBtn').disabled = true;
        }
    });
    // Platform selection removed; backend uses default configured handles
    let selectedHandles = [];
    let generatedHTML = '';
    let screenshotInfo = null;
    let currentPreviewMode = 'desktop';

    // Character counter and button state management
    document.getElementById('contentInput').addEventListener('input', function () {
        const count = this.value.length;
        const content = this.value.trim();
        document.getElementById('charCount').textContent = count;

        // Update character count styling
        const charCount = document.getElementById('charCount');
        if (count > 280) {
            charCount.style.color = 'var(--accent-danger)';
        } else if (count > 200) {
            charCount.style.color = 'var(--accent-warning)';
        } else {
            charCount.style.color = 'var(--text-muted)';
        }

        // Enable/disable buttons based on content availability
        const generateHtmlBtn = document.getElementById('generateHtmlBtn');
        generateHtmlBtn.disabled = !content;
    });

    function clearContent() {
        document.getElementById('contentInput').value = '';
        document.getElementById('charCount').textContent = '0';
        document.getElementById('charCount').style.color = 'var(--text-muted)';
        // Disable buttons when content is cleared
        document.getElementById('generateHtmlBtn').disabled = true;
    }

    function addEmoji() {
        const emojis = ['😊', '🎉', '🚀', '💡', '🔥', '⭐', '🎯', '💪', '🌟', '🎊'];
        const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
        const textarea = document.getElementById('contentInput');
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const text = textarea.value;
        textarea.value = text.substring(0, start) + randomEmoji + text.substring(end);
        textarea.selectionStart = textarea.selectionEnd = start + randomEmoji.length;
        textarea.focus();
    }

    function saveHandleSelection() {
        const checkboxes = document.querySelectorAll('#handlesModal input[type="checkbox"]:checked');
        selectedHandles = Array.from(checkboxes).map(cb => ({
            id: cb.value,
            platform: cb.dataset.platform,
            name: cb.dataset.name,
            page_id: cb.dataset.pageId
        }));

        const selectedDiv = document.getElementById('selectedHandles');
        if (selectedHandles.length > 0) {
            selectedDiv.innerHTML = `
                <div class="selected-handles-info">
                    <div class="selected-count mb-2">
                        <i class="fas fa-check-circle text-success me-2"></i>
                        <strong>${selectedHandles.length} platform(s) selected</strong>
                    </div>
                    <div class="selected-platforms">
                        ${selectedHandles.map(h => `
                            <span class="platform-badge ${h.platform}">
                                <i class="fab fa-${h.platform} me-1"></i>
                                ${h.name}
                            </span>
                        `).join('')}
                    </div>
                </div>
            `;
        } else {
            selectedDiv.innerHTML = '<div class="text-muted"><i class="fas fa-info-circle me-2"></i>No platforms selected</div>';
        }

        // Close modal
        bootstrap.Modal.getInstance(document.getElementById('handlesModal')).hide();
    }

    async function generateContent() {
        const content = document.getElementById('contentInput').value;
        if (!content.trim()) {
            showError('Please enter content to enhance');
            return;
        }

        showLoading('Enhancing content...', 'AI is polishing your copy for better engagement');
        try {
            const response = await fetch('/generate-content', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `content=${encodeURIComponent(content)}`
            });
            const data = await response.json();
            document.getElementById('contentInput').value = data.content;
            // Trigger input event to update character count and button states
            const event = new Event('input', { bubbles: true });
            document.getElementById('contentInput').dispatchEvent(event);
            showSuccess('Content enhanced successfully!');
        } catch (error) {
            console.error('Error:', error);
            showError('Failed to enhance content. You can proceed to generate HTML.');
        } finally {
            hideLoading();
        }
    }

    async function generateHTML() {
        const content = document.getElementById('contentInput').value;
        if (!content.trim()) {
            showError('Please enter content');
            return;
        }
        // No platform selection required

        showLoading('Generating preview...', 'Creating your content preview');
        try {
            const response = await fetch('/generate-post', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `content=${encodeURIComponent(content)}`
            });
            const data = await response.json();
            generatedHTML = data.html;

            // Show in iframe
            const iframe = document.getElementById('htmlPreviewFrame');
            const doc = iframe.contentWindow.document;
            doc.open();
            doc.write(generatedHTML);
            doc.close();

            // Close loading before opening preview to prevent stacked backdrops
            if (typeof hideLoading === 'function') hideLoading();

            // Remove any stale backdrops and modal-open state before opening preview
            document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
            document.body.classList.remove('modal-open');
            // Ensure body scroll is re-enabled
            document.body.style.removeProperty('overflow');

            const previewEl = document.getElementById('htmlPreviewModal');
            const previewModal = new bootstrap.Modal(previewEl);
            previewModal.show();
            // When preview is shown, auto-scroll to the top so it appears centered in viewport
            previewEl.addEventListener('shown.bs.modal', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, { once: true });
            // Ensure cleanup after hide
            previewEl.addEventListener('hidden.bs.modal', () => {
                document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
                document.body.classList.remove('modal-open');
                document.body.style.removeProperty('overflow');
            }, { once: true });
            document.getElementById('generateImageBtn').disabled = false;
            showSuccess('Preview generated successfully!');
        } catch (error) {
            console.error('Error:', error);
            showError('Failed to generate preview');
        } finally {
            hideLoading();
        }
    }

    function switchPreview(mode) {
        currentPreviewMode = mode;
        const iframe = document.getElementById('htmlPreviewFrame');

        if (mode === 'mobile') {
            iframe.style.width = '375px';
            iframe.style.margin = '0 auto';
            iframe.style.display = 'block';
        } else {
            iframe.style.width = '100%';
            iframe.style.margin = '0';
            iframe.style.display = 'block';
        }
    }

    function proceedToImage() {
        bootstrap.Modal.getInstance(document.getElementById('htmlPreviewModal')).hide();
        setTimeout(() => generateImage(), 500);
    }

    async function generateImage() {
        if (!generatedHTML) {
            showError('Please generate HTML preview first');
            return;
        }

        showLoading('Generating News Card...', 'Creating visual preview of your content');
        try {
            const response = await fetch('/generate-screenshot', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `content=${encodeURIComponent(generatedHTML)}`
            });
            const data = await response.json();
            screenshotInfo = data;
            displayScreenshot(screenshotInfo);
            document.getElementById('postToSocialBtn').disabled = false;
            showSuccess('News Card generated successfully!');
        } catch (error) {
            console.error('Error:', error);
            showError('Failed to generate screenshot');
        } finally {
            hideLoading();
        }
    }

    async function postToSocial() {
        if (!generatedHTML) {
            showError('Please generate a post first');
            return;
        }
        if (!screenshotInfo) {
            showError('Please generate a screenshot before publishing');
            return;
        }

        showLoading('Publishing content...', 'Posting using backend fixed targets');
        try {
            const imageArg = (screenshotInfo.url || screenshotInfo.path || '').toString();
            const response = await fetch('/post-fixed', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `content=${encodeURIComponent(generatedHTML)}&image=${encodeURIComponent(imageArg)}`
            });

            const data = await response.json();

            // Keep showing the screenshot we already generated
            displayScreenshot(screenshotInfo);

            // Normalize results from new API shape { whatsapp, facebook }
            const results = [];
            if (data.whatsapp) {
                results.push({
                    success: !!data.whatsapp.success,
                    platform: 'whatsapp',
                    message: data.whatsapp.success ? 'Posted successfully to WhatsApp' : (data.whatsapp.error || 'Failed to post to WhatsApp')
                });
            }
            if (data.facebook) {
                results.push({
                    success: !!data.facebook.success,
                    platform: 'facebook',
                    message: data.facebook.success ? 'Posted successfully to Facebook' : (data.facebook.error || 'Failed to post to Facebook')
                });
            }
            displayResults(results);

            showSuccess('Content published successfully!');

        } catch (error) {
            console.error('Error:', error);
            showError('Failed to publish content. Please try again.');
        } finally {
            hideLoading();
        }
    }

    function displayScreenshot(screenshot) {
        const container = document.getElementById('screenshotPreview');
        container.innerHTML = `
            <div class="row mt-5">
                <div class="col-12">
                    <div class="card fade-in-delay-3">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">
                                <i class="fas fa-camera me-2"></i>Generated News Card
                            </h5>
                            <div class="screenshot-actions">
                                <a href="${screenshot.url}" download="${screenshot.filename}" class="btn btn-outline-primary btn-sm">
                                    <i class="fas fa-download me-1"></i>Download
                                </a>
                                <a href="/screenshots" class="btn btn-outline-success btn-sm">
                                    <i class="fas fa-images me-1"></i>View Gallery
                                </a>
                            </div>
                        </div>
                        <div class="card-body text-center">
                            <div class="screenshot-display">
                                <img src="${screenshot.url}" alt="Generated News Card" class="img-fluid rounded shadow-lg" style="max-height: 500px;">
                                <div class="screenshot-info mt-3">
                                    <p class="text-muted mb-2">News Card saved as: <code>${screenshot.filename}</code></p>
                                    <div class="screenshot-meta">
                                        <span class="badge bg-secondary me-2">Generated: ${new Date().toLocaleString()}</span>
                                        <span class="badge bg-info">Platforms: ${selectedHandles.length}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    function displayResults(results) {
        const container = document.getElementById('postResults');
        let html = '';

        if (results && results.length > 0) {
            html = `
                <div class="row mt-5">
                    <div class="col-12">
                        <div class="card fade-in-delay-4">
                            <div class="card-header">
                                <h5 class="mb-0">
                                    <i class="fas fa-check-circle me-2 text-success"></i>Publishing Results
                                </h5>
                            </div>
                            <div class="card-body">
                                <div class="results-grid">
                                    ${results.map(result => `
                                        <div class="result-item ${result.success ? 'success' : 'error'}">
                                            <div class="result-icon">
                                                <i class="fas fa-${result.success ? 'check-circle' : 'exclamation-triangle'}"></i>
                                            </div>
                                            <div class="result-details">
                                                <strong>${result.platform}</strong>
                                                <p class="mb-0">${result.message}</p>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        container.innerHTML = html;
    }
</script>
