<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>News Card 1080x1080</title>
<style>
  @font-face {
    font-family: "TAMIL-UNI013";
    src: url("https://newsit-assets.s3.ap-south-1.amazonaws.com/template/TAMIL-UNI013.ttf") format("truetype");
    font-weight: normal;
    font-style: normal;
  }

  :root{
    --image-height: 400px;   /* fixed top image height */
    --pad: 48px;             /* padding in content section */
    --gap: 24px;             /* gap between elements */
    --min-title: 16px;
    --max-title: 140px;
  }

  html, body {
    height: 100%;
    margin: 0;
    font-family: "Helvetica Neue", Arial, "Noto Sans Tamil", "Latha", sans-serif;
    background: #fff;
    overflow: hidden; /* clean capture */
  }

  body.lang-ta { direction: ltr; }

  .container {
    width: 100vw;
    height: 100vh;
    display: grid;
    grid-template-rows: var(--image-height) calc(100vh - var(--image-height));
    background: #fff;
  }

  /* Image Section */
  .image-section {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .news-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .image-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.15), rgba(0,0,0,0.0) 60%);
    pointer-events: none;
  }

  .category-badge {
    position: absolute;
    left: 32px;
    bottom: 24px;
    background: #007bff;
    color: #fff;
    padding: 10px 18px;
    border-radius: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-size: 20px;
    white-space: nowrap;
    max-width: calc(100% - 64px);
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Content Section */
  .content-section {
    box-sizing: border-box;
    padding: var(--pad);
    display: grid;
    grid-template-rows: 1fr auto; /* headline | footer */
    row-gap: var(--gap);
    overflow: hidden;
  }

  .headline-wrap {
    overflow: hidden;
    min-height: 0;
  }

  .headline {
    margin: 0;
    font-weight: 800;
    color: #1a1a1a;
    line-height: 1.08;
    overflow: hidden;
    /* robust wrapping */
    overflow-wrap: anywhere;
    word-break: break-word;
    font-family: "TAMIL-UNI013", "Helvetica Neue", Arial, "Noto Sans Tamil", "Latha", sans-serif;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #777;
    font-size: 22px;
    font-weight: 600;
    gap: 16px;
    min-height: 28px;
  }

  .source, .date {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 48%;
  }
</style>
</head>
<body class="lang-ta">
  <div class="container">
    <div class="image-section">
      <img src="{{image_url}}" alt="News Image" class="news-image" />
      <div class="image-overlay"></div>
      <div class="category-badge">{{category}}</div>
    </div>

    <div class="content-section">
      <div class="headline-wrap">
        <div class="headline">{{content}}</div>
      </div>
      <div class="footer">
        <div class="source">{{source}}</div>
        <div class="date">{{date}}</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/kishorek/dynamic-font-size-js@refs/heads/main/fontfit.js"></script>
  <script>
    const container = document.querySelector(".headline-wrap");
    const headline = document.querySelector(".headline");
    const controller = window.fitFontToContainer(headline, container, {
      minPx: 8,
      maxPx: 80,
    });
    requestAnimationFrame(() => controller.refit());
  </script>
</body>
</html>
