server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vue Router — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SMART RADAR backend — intelligence, posts, clusters, analysis
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # OmniPush backend — publishing, drafts, media, analytics, AI content
    location /v1/ {
        proxy_pass http://omnipush:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # WebSocket (SMART RADAR)
    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Health checks
    location /health {
        proxy_pass http://backend:8000;
    }
}
